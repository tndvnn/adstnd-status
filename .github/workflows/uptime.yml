# Upptime monitor — runs all commands in a single job to avoid stale checkout issues.
# Each step pulls latest before running so it sees commits from prior steps.

name: Upptime
on:
  push:
    branches: [master]
  repository_dispatch:
    types: [trigger]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    name: Upptime pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check status
        continue-on-error: true
        uses: upptime/uptime-monitor@master
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          UPTIME_PING_SECRET: ${{ secrets.UPTIME_PING_SECRET }}

      - name: Pull latest
        run: git pull --rebase --autostash

      - name: Response time check
        continue-on-error: true
        uses: upptime/uptime-monitor@master
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          UPTIME_PING_SECRET: ${{ secrets.UPTIME_PING_SECRET }}

      - name: Pull latest
        run: git pull --rebase --autostash

      - name: README
        continue-on-error: true
        uses: upptime/uptime-monitor@master
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Pull latest
        run: git pull --rebase --autostash

      - name: Graphs
        continue-on-error: true
        uses: upptime/uptime-monitor@master
        with:
          command: "graphs"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Pull latest
        run: git pull --rebase --autostash

      - name: Static site
        uses: upptime/uptime-monitor@master
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
